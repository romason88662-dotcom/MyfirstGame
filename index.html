<div id="s"></div>

<style>
#s{
width:50px;
height:50px;
background:red;
position:absolute;
}
</style>

<script>
x = 0
y = 0
onkeydown = e=>{
if(e.key=="ArrowRight") x += 50
if(e.key=="ArrowLeft") x -= 50
if(e.key=="ArrowDown") y += 50
if(e.key=="ArrowUp") y -= 50
s.style.top = y + "px"
s.style.left = x + "px"
}
</script>
